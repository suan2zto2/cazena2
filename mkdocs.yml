site_name: 테세라위버 기획서
site_url: https://suan2z.github.io/2048/

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

  # 🎨 컬러 테마: 다크 모드(slate) 고정 및 형광 포인트
  palette:
    scheme: slate
    primary: teal       # 상단 바 - 다크 틸 계열
    accent: cyan        # 강조 색상 - 시안

  # 폰트 설정
  font:
    text: Roboto
    code: Roboto Mono

# 🖌️ 세부 디자인을 위한 CSS 파일 연결
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/scroll_top.js
  - javascripts/build_data.js

# 메뉴 구조
nav:
  - 게임 개요: index.md
  - 인게임 전투:
    - systems/overview.md
    - 캐릭터 시스템: systems/character.md
    - 보드 시스템: systems/board.md
    - 카드 시스템: systems/card.md
    - 전투 흐름: systems/combat.md
    - 적 AI: systems/enemy.md
    - 전투 화면 목업: combat_mockup.md
  - 게임 세부 시스템:
    - 아웃게임 시스템: outgame.md
    - 스테이지 진행: systems/stage.md
    - 성장 시스템: systems/growth.md
  - 아웃게임 UI:
    - UI/UX 개요: ux.md
    - 전체 구조 순서도: outgame_flowchart.md
    - UI 목업: outgame_mockup.md
  - 데이터:
    - 스키마 설계: schema.md
    - 열거형 정의: enums.md
    - 기획 테이블 시트: data_sheet.md
  - 콘텐츠:
    - 시나리오: contents/scenario.md
    - 캐릭터: contents/characters.md
  - 필요 리소스: resources.md
  - 일정: schedule.md
  - 백업:
    - 안 A — 카제나 방식 × 패키지 RPG: backup/concept_A.md
    - 안 B — 스테이지 클리어 × 덱 리셋 로그라이크: backup/concept_B.md
    - 안 C — 2048 에너지 보드 × 덱 카드 RPG: backup/concept_C.md
    - 림버스 컴퍼니: references/limbus.md
    - 카오스 제로 나이트메어: references/chaos_zero_nightmare.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      toc_depth: 2